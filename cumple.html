<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Frank!</title>
    <style>
        /* Estilos Generales y Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            perspective: 1000px;
        }

        /* Efecto de Luces de Fiesta de Fondo */
        .party-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 128, 0.2), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.2), transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(255, 255, 0, 0.1), transparent 60%);
            animation: shiftLights 6s ease-in-out infinite alternate;
        }

        @keyframes shiftLights {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* Contenedor Principal de la Tarjeta Festiva */
        .card-container {
            text-align: center;
            background: rgba(20, 20, 35, 0.85);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 0, 128, 0.3), 0 0 80px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border: 2px solid #ff007f;
            z-index: 10;
            animation: pulseCard 2s infinite alternate, fadeIn 1s ease-out;
            max-width: 90%;
            width: 480px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulseCard {
            0% { box-shadow: 0 0 30px rgba(255, 0, 128, 0.2), 0 0 60px rgba(0, 255, 255, 0.1); border-color: #ff007f; }
            100% { box-shadow: 0 0 50px rgba(255, 0, 128, 0.5), 0 0 100px rgba(0, 255, 255, 0.4); border-color: #00ffff; }
        }

        /* Títulos con Colores Chillones y Efecto Neón */
        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: shakeText 0.5s infinite alternate;
        }

        h2 {
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff;
            margin-bottom: 1.5rem;
            letter-spacing: 6px;
            animation: colorGlitch 1s linear infinite;
        }

        @keyframes shakeText {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }

        @keyframes colorGlitch {
            0%, 100% { color: #fff; }
            33% { color: #ffff00; }
            66% { color: #ff00ff; }
        }

        /* Párrafo Informativo */
        p {
            font-size: 1.1rem;
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* Zona de Regalos Interactivos (Reemplaza al botón único) */
        .gifts-zone {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .gift-box {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            display: inline-block;
            animation: jiggleGift 0.6s infinite alternate;
        }

        /* Variación de tiempos de animación para que no se muevan iguales */
        .gift-box:nth-child(2) { animation-delay: 0.2s; }
        .gift-box:nth-child(3) { animation-delay: 0.4s; }

        .gift-box:hover {
            transform: scale(1.3) rotate(15deg);
        }

        @keyframes jiggleGift {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-10px) rotate(5deg); }
        }

        /* Elementos de Celebración Dinámicos (Confeti y Globos) */
        .celebration-element {
            position: absolute;
            z-index: 5;
            top: -50px;
            pointer-events: none;
        }

        .confetti {
            width: 12px;
            height: 12px;
            animation: fallConfetti linear forwards;
        }

        .balloon {
            font-size: 2.5rem;
            animation: floatBalloon linear forwards;
            top: 105vh;
        }

        @keyframes fallConfetti {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }

        @keyframes floatBalloon {
            0% { transform: translateY(0) scale(1) translateX(0); opacity: 1; }
            100% { transform: translateY(-115vh) scale(1.2) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="party-lights"></div>

    <div class="card-container">
        <h1>¡Feliz Cumpleaños!</h1>
        <h2>FRANK</h2>
        
        <div class="gifts-zone">
            <div class="gift-box" onclick="explodeCelebration(this)">🎁</div>
            <div class="gift-box" onclick="explodeCelebration(this)">🎁</div>
            <div class="gift-box" onclick="explodeCelebration(this)">🎁</div>
        </div>
    </div>

    <script>
        // Paleta de colores chillones / eléctricos de fiesta
        const neonColors = ['#ff007f', '#00ffff', '#ffff00', '#ff00ff', '#00ff00', '#ff4500', '#7fff00'];
        const balloonEmojis = ['🎈', '🎈', '🎉', '✨', '🥳'];

        function spawnElement(type) {
            const element = document.createElement('div');
            element.classList.add('celebration-element');
            
            // Posicionamiento horizontal aleatorio a lo ancho de la ventana
            element.style.left = Math.random() * 100 + 'vw';
            
            const duration = Math.random() * 2.5 + 2; 
            element.style.animationDuration = duration + 's';

            if (type === 'confetti') {
                element.classList.add('confetti');
                element.style.backgroundColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                
                // Variación de formas
                if (Math.random() > 0.5) {
                    element.style.borderRadius = '50%';
                } else if (Math.random() > 0.3) {
                    element.style.transform = 'skewX(20deg)';
                }
                
                document.body.appendChild(element);
                setTimeout(() => element.remove(), duration * 1000);
                
            } else if (type === 'balloon') {
                element.classList.add('balloon');
                element.innerText = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
                // Ajuste de velocidad para los globos ascendentes
                const balloonDuration = Math.random() * 3 + 3;
                element.style.animationDuration = balloonDuration + 's';
                
                document.body.appendChild(element);
                setTimeout(() => element.remove(), balloonDuration * 1000);
            }
        }

        function explodeCelebration(giftElement) {
            // Animación física de impacto temporal en el regalo seleccionado
            giftElement.style.transform = 'scale(0.5)';
            setTimeout(() => {
                giftElement.style.transform = '';
            }, 150);

            // Ráfaga masiva instantánea combinada
            for (let i = 0; i < 45; i++) {
                setTimeout(() => spawnElement('confetti'), i * 2);
            }
            for (let j = 0; j < 8; j++) {
                setTimeout(() => spawnElement('balloon'), j * 40);
            }
        }

        // Cascada continua ambiental automática de baja intensidad
        setInterval(() => {
            spawnElement('confetti');
        }, 100);

        setInterval(() => {
            if(Math.random() > 0.4) spawnElement('balloon');
        }, 800);
    </script>

</body>
</html>
